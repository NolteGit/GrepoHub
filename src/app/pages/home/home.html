<section class="home-page">
  <header class="home-page__hero">
    <p class="home-page__eyebrow">{{ 'home.eyebrow' | translate }}</p>
    <h1>{{ 'home.title' | translate }}</h1>
    <p class="home-page__subtitle">
      {{ 'home.subtitle' | translate }}
    </p>
  </header>

  <section class="dashboard-grid" [attr.aria-label]="'home.dashboardAria' | translate">
    @for (card of dashboardCards; track card.path) {
      <a
        class="dashboard-card"
        [class.dashboard-card--featured]="card.featured"
        [routerLink]="card.path"
      >
        <div class="dashboard-card__content">
          <h2>{{ card.titleKey | translate }}</h2>
          <p>{{ card.descriptionKey | translate }}</p>
        </div>
      </a>
    }
  </section>
</section>
