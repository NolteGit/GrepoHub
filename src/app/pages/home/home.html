<section class="home-page">
  <section
    class="compass-dashboard"
    [class.compass-dashboard--active]="activeCard !== null"
    [style.--needle-angle]="needleAngle"
    [attr.aria-label]="'home.dashboardAria' | translate"
    (mouseleave)="clearActiveCard()"
  >
    <div class="compass-dashboard__center">
      <div class="compass-dashboard__brand">
        <h1>{{ 'home.title' | translate }}</h1>
      </div>

      <div #compassOrb class="compass-mark" aria-hidden="true">
        <svg viewBox="0 0 320 320" role="img">
          <defs>
            <radialGradient id="compassCore" cx="50%" cy="50%" r="58%">
              <stop offset="0%" stop-color="#003566" stop-opacity="0.88" />
              <stop offset="58%" stop-color="#001d3d" stop-opacity="0.82" />
              <stop offset="100%" stop-color="#000814" stop-opacity="0.1" />
            </radialGradient>
            <linearGradient id="needleGold" x1="0%" x2="100%" y1="0%" y2="0%">
              <stop offset="0%" stop-color="#ffc300" />
              <stop offset="48%" stop-color="#fff8dc" />
              <stop offset="100%" stop-color="#ffd60a" />
            </linearGradient>
            <linearGradient id="needleTail" x1="0%" x2="100%" y1="0%" y2="0%">
              <stop offset="0%" stop-color="#fff8dc" stop-opacity="0.86" />
              <stop offset="100%" stop-color="#ffc300" stop-opacity="0.78" />
            </linearGradient>
            <filter id="compassGlow" x="-40%" y="-40%" width="180%" height="180%">
              <feGaussianBlur stdDeviation="4" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <circle class="compass-mark__aura" cx="160" cy="160" r="143" />
          <circle class="compass-mark__base" cx="160" cy="160" r="128" />
          <circle class="compass-mark__ring compass-mark__ring--outer" cx="160" cy="160" r="126" />
          <circle class="compass-mark__ring compass-mark__ring--broken" cx="160" cy="160" r="104" />
          <circle class="compass-mark__ring compass-mark__ring--inner" cx="160" cy="160" r="63" />

          <path class="compass-mark__axis" d="M160 42V278" />
          <path class="compass-mark__axis" d="M42 160H278" />
          <path class="compass-mark__axis compass-mark__axis--soft" d="M76.6 76.6L243.4 243.4" />
          <path class="compass-mark__axis compass-mark__axis--soft" d="M243.4 76.6L76.6 243.4" />

          <path
            class="compass-mark__star compass-mark__star--long"
            d="M160 28L176 130L292 160L176 190L160 292L144 190L28 160L144 130Z"
          />
          <path
            class="compass-mark__star compass-mark__star--short"
            d="M160 78L174 146L242 160L174 174L160 242L146 174L78 160L146 146Z"
          />

          <g class="compass-mark__nodes">
            <circle cx="160" cy="34" r="9" />
            <circle cx="286" cy="160" r="9" />
            <circle cx="160" cy="286" r="9" />
            <circle cx="34" cy="160" r="9" />
          </g>

          <g class="compass-mark__needle">
            <path class="compass-mark__needle-head" d="M160 42L180 160L160 144L140 160Z" />
            <path class="compass-mark__needle-tail" d="M160 278L140 160L160 176L180 160Z" />
          </g>

          <circle class="compass-mark__hub-shadow" cx="160" cy="160" r="25" />
          <circle class="compass-mark__hub" cx="160" cy="160" r="17" />
          <circle class="compass-mark__hub-dot" cx="160" cy="160" r="5" />
        </svg>
      </div>

      <div class="compass-dashboard__label">
        <span>{{ compassLabelKey | translate }}</span>
      </div>
    </div>

    @for (card of dashboardCards; track card.path) {
      <a
        #cardElement
        class="dashboard-card"
        [class.dashboard-card--active]="activeCard?.id === card.id"
        [class.dashboard-card--north-west]="card.position === 'north-west'"
        [class.dashboard-card--north-east]="card.position === 'north-east'"
        [class.dashboard-card--south-west]="card.position === 'south-west'"
        [class.dashboard-card--south-east]="card.position === 'south-east'"
        [routerLink]="card.path"
        (mouseenter)="setActiveCard(card, cardElement)"
        (focus)="setActiveCard(card, cardElement)"
        (blur)="clearActiveCard()"
      >
        <div class="dashboard-card__content">
          <h2>{{ card.titleKey | translate }}</h2>
          <p>{{ card.descriptionKey | translate }}</p>
        </div>
      </a>
    }
  </section>
</section>
