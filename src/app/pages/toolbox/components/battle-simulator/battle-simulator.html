<section
  class="simulator-section"
  id="battle-simulator"
  [attr.aria-label]="'toolbox.battle.aria' | translate"
>
  <header class="simulator-toolbar">
    <div>
      <span>{{ summary.eyebrowKey | translate }}</span>
      <h2>{{ summary.titleKey | translate }}</h2>
    </div>

    <div class="simulator-actions" [attr.aria-label]="'toolbox.battle.actionsAria' | translate">
      <button type="button">{{ 'toolbox.battle.loadConfig' | translate }}</button>
      <button type="button">{{ 'toolbox.battle.saveConfig' | translate }}</button>
    </div>
  </header>

  <div class="simulator-workspace">
    <section class="battle-setup-row">
      <label class="battle-side-card">
        <span>{{ 'toolbox.battle.attacker' | translate }}</span>
        <input
          type="text"
          [value]="draft.attackerPreset"
          (input)="
            draftUpdated.emit({
              toolId: 'battle-simulator',
              field: 'attackerPreset',
              event: $event,
            })
          "
        />
      </label>

      <div class="battle-versus">{{ 'toolbox.battle.versus' | translate }}</div>

      <label class="battle-side-card">
        <span>{{ 'toolbox.battle.defender' | translate }}</span>
        <input
          type="text"
          [value]="draft.defenderPreset"
          (input)="
            draftUpdated.emit({
              toolId: 'battle-simulator',
              field: 'defenderPreset',
              event: $event,
            })
          "
        />
      </label>
    </section>

    <div class="battle-placeholder-copy">
      <strong>{{ 'toolbox.battle.workspaceTitle' | translate }}</strong>
      <p>{{ 'toolbox.battle.workspaceDescription' | translate }}</p>
    </div>
  </div>
</section>
