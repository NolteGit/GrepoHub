<aside class="active-monitor" [attr.aria-label]="'toolbox.queue.aria' | translate">
  <header class="active-monitor__header">
    <h2>{{ 'toolbox.queue.title' | translate }}</h2>
  </header>

  <div class="active-monitor__list">
    @for (item of items; track item.id) {
      <article
        class="active-monitor__item"
        [class.queue-item--new]="isQueueItemFresh(item.id)"
        [attr.data-tone]="item.tone"
      >
        <div class="active-monitor__item-content">
          <div class="active-monitor__meta">
            <strong>{{ item.label }}</strong>
            <span>{{ item.stateKey | translate }}</span>
          </div>

          <p>{{ item.value }}</p>
        </div>

        <div class="active-monitor__actions">
          @if (canToggleQueueItem(item)) {
            <button
              type="button"
              class="active-monitor__icon-button active-monitor__icon-button--toggle"
              [attr.aria-label]="(queueToggleLabelKey(item) | translate) + ' ' + item.label"
              (click)="itemToggled.emit(item)"
            >
              @if (item.running) {
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M8 5h3v14H8zM13 5h3v14h-3z" />
                </svg>
              } @else {
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M8 5v14l11-7z" />
                </svg>
              }
            </button>
          }

          <button
            type="button"
            class="active-monitor__icon-button active-monitor__icon-button--delete"
            [attr.aria-label]="('toolbox.queue.remove' | translate) + ' ' + item.label"
            (click)="itemRemoved.emit(item)"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M9 3h6l1 2h4v2H4V5h4z" />
              <path d="M6 9h12l-1 12H7z" />
              <path d="M10 11h2v8h-2zM14 11h2v8h-2z" />
            </svg>
          </button>
        </div>
      </article>
    } @empty {
      <p class="active-monitor__empty">{{ 'toolbox.queue.empty' | translate }}</p>
    }
  </div>
</aside>
