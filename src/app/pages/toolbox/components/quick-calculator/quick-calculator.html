<article
  class="quick-card calculator-card"
  [class.calculator-card--keyboard-active]="keyboardActive"
  id="quick-calculator"
  aria-label="Calculator"
  tabindex="0"
  (focusin)="keyboardActivate.emit()"
>
  <header class="calculator-card__header">
    <h2>Calculator</h2>
  </header>

  <div class="calculator-history" aria-label="Recent calculations">
    @for (historyItem of draft.calculatorHistory.slice(0, 3); track historyItem) {
      <span>{{ historyItem }}</span>
    } @empty {
      <span class="calculator-history__empty">Recent calculations appear here.</span>
    }
  </div>

  <div class="calculator-screen" aria-live="polite">
    <span>{{ preview }}</span>
    <strong>{{ draft.calculatorDisplay }}</strong>
  </div>

  <div class="calculator-pad" aria-label="Calculator keypad">
    @for (button of buttons; track button.label) {
      <button
        type="button"
        [class]="button.className || ''"
        [attr.aria-label]="button.ariaLabel || null"
        (click)="buttonPressed.emit(button)"
      >
        {{ button.label }}
      </button>
    }
  </div>
</article>
