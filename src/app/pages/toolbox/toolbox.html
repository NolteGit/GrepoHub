<section class="toolbox-page">
  <app-toolbox-hero />

  <section class="quick-console" aria-label="Quick toolbox console">
    <app-quick-calculator
      [draft]="draftFor('quick-calculator')"
      [preview]="calculatorPreview()"
      [buttons]="calculatorButtons"
      [keyboardActive]="calculatorKeyboardActive()"
      (keyboardActivate)="activateCalculatorKeyboard()"
      (buttonPressed)="pressCalculatorButton($event)"
    />

    <app-time-calculator
      [draft]="draftFor('time-calculator')"
      [baseDisplay]="timeBaseDisplay()"
      [deltaDisplay]="timeDeltaDisplay()"
      [result]="timeCalculationResult()"
      [timePartControls]="timePartControls"
      [timeOffsetControls]="timeOffsetControls"
      (currentTimeRequested)="useCurrentTime($event)"
      (timeOffsetReset)="resetTimeOffset()"
      (timeOffsetAdjustedBySeconds)="adjustTimeOffsetBySeconds($event)"
      (directionToggled)="toggleTimeDirection()"
      (timePartAdjusted)="adjustTimePart($event.part, $event.amount)"
      (timePartUpdated)="updateTimePart($event.toolId, $event.field, $event.part, $event.event)"
      (timeOffsetAdjusted)="adjustTimeOffset($event.field, $event.amount)"
      (draftUpdated)="updateDraft($event.toolId, $event.field, $event.event)"
      (timeInputEditStarted)="startTimeInputEdit($event.mode, $event.event)"
      (timeInputKeydown)="handleTimeInputKeydown($event.mode, $event.event)"
      (timeInputEditFinished)="finishTimeInputEdit($event)"
    />

    <app-reminder-widget
      [activeMode]="activeReminderMode()"
      [reminderModes]="reminderModes"
      [alarmDraft]="draftFor('alarm')"
      [countdownDraft]="draftFor('countdown')"
      [stopwatchDraft]="draftFor('stopwatch')"
      [alarmStatus]="alarmStatus()"
      [countdownStatus]="countdownStatus()"
      [countdownRunning]="countdownRunning()"
      [countdownDisplay]="countdownDisplay()"
      [canAddCountdownToQueue]="canAddCountdownToQueue()"
      [stopwatchRunning]="stopwatchRunning()"
      [stopwatchStatus]="stopwatchStatus()"
      [stopwatchDisplay]="stopwatchDisplay()"
      [canAddStopwatchToQueue]="canAddStopwatchToQueue()"
      [alarmPresets]="alarmPresets"
      (reminderModeSelected)="setReminderMode($event)"
      (timeInputEditStarted)="startTimeInputEdit($event.mode, $event.event)"
      (timeInputKeydown)="handleTimeInputKeydown($event.mode, $event.event)"
      (timeInputEditFinished)="finishTimeInputEdit($event)"
      (draftUpdated)="updateDraft($event.toolId, $event.field, $event.event)"
      (alarmArmed)="armAlarm()"
      (alarmPresetSelected)="setAlarmPreset($event)"
      (countdownToggled)="toggleCountdown()"
      (countdownAdded)="addCountdownToQueue()"
      (countdownPresetSelected)="setCountdownPreset($event)"
      (countdownReset)="resetCountdown()"
      (stopwatchToggled)="toggleStopwatch()"
      (stopwatchAdded)="addStopwatchToQueue()"
      (stopwatchReset)="resetStopwatch()"
    />

    <app-active-timer-queue
      [items]="activeTimerItems()"
      [freshItemIds]="freshQueueItemIds()"
      (itemRemoved)="removeActiveItem($event)"
      (itemToggled)="toggleQueueItem($event)"
    />
  </section>

  @if (showBattleSimulator) {
    <app-battle-simulator
      [summary]="battleSimulator"
      [draft]="draftFor('battle-simulator')"
      (draftUpdated)="updateDraft($event.toolId, $event.field, $event.event)"
    />
  }
</section>
