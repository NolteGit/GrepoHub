<main
  class="gh-app-bg grid min-h-dvh grid-cols-[minmax(14rem,15.5rem)_minmax(0,1fr)_minmax(19rem,22rem)] grid-rows-[auto_minmax(0,1fr)] max-[76rem]:grid-cols-[4.8rem_minmax(0,1fr)] max-[46rem]:grid-cols-1"
>
  <app-planner-toolbox class="col-start-1 row-span-full max-[46rem]:hidden" />

  <app-planner-header
    class="col-start-2 col-end-4 row-start-1 min-w-0 border-b border-[var(--gh-border-soft)] max-[76rem]:col-end-3 max-[46rem]:col-start-1"
    [activePlanId]="activePlan().id"
    [plans]="plans()"
    [title]="'plannerV2.title' | translate"
    (planSelected)="selectPlan($event)"
  />

  <section class="col-start-2 row-start-2 grid min-h-0 min-w-0 p-2 max-[46rem]:col-start-1">
    <section
      class="gh-surface grid min-h-0 grid-rows-[auto_minmax(0,1fr)_auto] overflow-hidden rounded-xl"
    >
      <app-planner-mode-switch [activeMode]="activeMode()" (modeSelected)="selectMode($event)" />

      <section class="gh-scroll-area min-h-0 overflow-auto p-3">
        @if (activeMode() === 'city') {
          <app-planner-city-setup
            [contextLeft]="cityContextLeft()"
            [contextRight]="cityContextRight()"
            [modifiers]="cityModifiers()"
            [buildings]="cityBuildings()"
            [specialSlots]="specialSlots()"
            (buildingLevelChanged)="updateBuildingLevel($event.buildingId, $event.level)"
            (modifierToggled)="toggleCityModifier($event)"
            (specialBuildingSelected)="selectSpecialBuilding($event.slotId, $event.optionId)"
          />
        } @else {
          <app-planner-troop-setup
            [contextLeft]="troopContextLeft()"
            [contextRight]="troopContextRight()"
            [categories]="troopCategories"
            [activeCategory]="selectedTroopCategory()"
            [selectedGod]="selectedGod()"
            [gods]="gods"
            [units]="unitPlaceholders"
            (categorySelected)="selectTroopCategory($event)"
            (godSelected)="selectGod($event)"
          />
        }
      </section>

      <app-planner-bottom-summary [stats]="bottomSummaryStats()" />
    </section>
  </section>

  <app-planner-summary-sidebar
    class="col-start-3 row-start-2 min-h-0 min-w-0 max-[76rem]:hidden"
    [activeMode]="activeMode()"
    [population]="sidebarPopulation()"
    [usedUnitCount]="usedUnitCount()"
    [cityPreviewStats]="cityPreviewStats()"
  />
</main>
