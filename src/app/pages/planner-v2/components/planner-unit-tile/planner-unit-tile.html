<article
  class="gh-panel grid min-h-[10rem] grid-cols-[4.4rem_minmax(0,1fr)] grid-rows-[minmax(6.35rem,auto)_auto] gap-2 rounded-md p-3"
>
  <div class="gh-icon-box grid aspect-square w-16 place-items-center overflow-hidden rounded-md">
    @if (unit().imagePath) {
      <img
        class="h-full w-full object-contain p-1"
        [src]="unit().imagePath"
        [alt]="unit().labelKey | translate: unit().fallback"
        loading="lazy"
      />
    } @else {
      <span class="text-2xl" aria-hidden="true">{{ unit().icon }}</span>
    }
  </div>

  <div class="grid min-w-0 content-start gap-2">
    <div class="flex min-w-0 items-start justify-between gap-2">
      <h2 class="m-0 truncate text-base font-bold text-[var(--gh-text)]">
        {{ unit().labelKey | translate: unit().fallback }}
      </h2>
      <span
        class="shrink-0 rounded border border-[var(--gh-border-soft)] bg-white/5 px-1.5 py-0.5 text-xs font-bold text-[var(--gh-muted)]"
      >
        {{ unit().amount }}
      </span>
    </div>

    <div class="grid min-w-0 gap-2">
      <span class="text-xs text-[var(--gh-muted)]">{{
        'plannerV2.amount' | translate: 'Amount'
      }}</span>
      <app-gh-number-stepper
        [value]="unit().amount"
        [min]="0"
        [step]="10"
        [showMinMax]="true"
        (valueChange)="amountChanged.emit($event)"
      />
    </div>
  </div>

  <footer class="col-span-full grid gap-1 border-t border-[var(--gh-border-soft)] pt-2 text-xs">
    @for (stat of unit().stats; track stat.labelKey) {
      <div class="flex min-w-0 items-center justify-between gap-2">
        <span class="truncate text-[var(--gh-muted)]">{{
          stat.labelKey | translate: stat.fallback
        }}</span>
        <strong
          class="shrink-0 text-right"
          [class.text-[var(--gh-gold)]]="stat.tone !== 'muted'"
          [class.text-[var(--gh-muted)]]="stat.tone === 'muted'"
        >
          {{ stat.value }}
        </strong>
      </div>
    }
  </footer>
</article>
