<nav class="planner-mode-switch" [attr.aria-label]="ariaLabelKey | translate: ariaLabelFallback">
  @for (option of options; track option.id) {
    <button
      type="button"
      class="planner-mode-switch__option"
      [class.planner-mode-switch__option--active]="activeMode() === option.id"
      [attr.aria-pressed]="activeMode() === option.id"
      (click)="selectMode(option.id)"
    >
      <span aria-hidden="true">{{ option.icon }}</span>
      <strong>{{ option.labelKey | translate: option.fallback }}</strong>
    </button>
  }
</nav>
