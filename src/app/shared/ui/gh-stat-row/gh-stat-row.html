<div class="flex min-w-0 items-center justify-between gap-4">
  <span class="flex min-w-0 items-center gap-2 text-sm text-[var(--gh-text)]">
    @if (icon()) {
      <span class="shrink-0 text-[var(--gh-muted)]" aria-hidden="true">{{ icon() }}</span>
    }
    <span class="truncate">{{ labelKey() | translate: fallback() }}</span>
  </span>
  <strong [class]="valueClasses()">{{ value() }}</strong>
</div>
